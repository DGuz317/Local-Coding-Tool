name: Release Gate

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  release-gate:
    name: release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: .python-version

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev --locked

      - name: Full tests
        run: uv run pytest

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src/repolens

      - name: Context evaluation
        run: uv run repolens evaluate-context --json

      - name: Index repository for artifact audit
        run: uv run repolens index . --json

      - name: Artifact safety audit
        run: uv run repolens audit-artifacts . --json

      - name: Build distribution
        run: uv build --out-dir "${RUNNER_TEMP}/repolens-dist" --clear

      - name: Create clean install environment
        run: python -m venv "${RUNNER_TEMP}/repolens-smoke"

      - name: Install built wheel
        run: >-
          "${RUNNER_TEMP}/repolens-smoke/bin/python" -m pip install
          "${RUNNER_TEMP}"/repolens-dist/*.whl

      - name: Smoke installed CLI
        run: "${RUNNER_TEMP}/repolens-smoke/bin/repolens" --help

      - name: Smoke packaged first-use MCP workflow
        run: >-
          "${RUNNER_TEMP}/repolens-smoke/bin/python" tests/packaged_mcp_smoke.py
          --repolens "${RUNNER_TEMP}/repolens-smoke/bin/repolens"

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: repolens-dist
          path: ${{ runner.temp }}/repolens-dist/*
          if-no-files-found: error
