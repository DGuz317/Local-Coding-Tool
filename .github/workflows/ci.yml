name: CI

on:
  push:
    branches:
      - main
      - feature/repolens-v0.3
      - feature/repolens-v0.3.1
      - feature/repolens-v0.4
      - feature/repolens-v0.5
  pull_request:
    branches:
      - main
      - feature/repolens-v0.3
      - feature/repolens-v0.3.1
      - feature/repolens-v0.4
      - feature/repolens-v0.5

jobs:
  release-gate:
    name: Release Gate
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-extras --dev --locked

      - name: Run Ruff lint
        run: uv run ruff check .

      - name: Run Ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/repolens

      - name: Run graph-index budget regression tests
        run: uv run pytest tests/test_artifact_budget_contract.py tests/test_synthetic_large_repo_fixture.py

      - name: Run Context Pack tests
        run: uv run pytest tests/test_context_pack_contract.py tests/test_context_pack_service.py tests/test_context_evaluation.py

      - name: Run v0.4 package workspace tests
        run: uv run pytest tests/test_config_index.py tests/test_javascript_index.py tests/test_query_service.py

      - name: Run v0.5 preflight and artifact safety tests
        run: uv run pytest tests/test_artifact_audit.py tests/test_cli_preflight.py tests/test_mcp_server.py tests/test_resolver_contract.py

      - name: Run full test suite
        run: uv run pytest

      - name: Run Context Pack evaluation
        run: uv run repolens evaluate-context --manifest tests/fixtures/context_pack/evaluation_manifest.json --json

      - name: Run artifact safety audit
        run: uv run repolens audit-artifacts tests/fixtures/context_pack/happy-path --json

      - name: Build package
        run: uv build --out-dir "${RUNNER_TEMP}/repolens-dist" --clear

      - name: Create clean install environment
        run: python -m venv /tmp/repolens-smoke

      - name: Install built wheel
        run: /tmp/repolens-smoke/bin/python -m pip install "${RUNNER_TEMP}"/repolens-dist/*.whl

      - name: Smoke installed CLI
        run: |
          smoke_parent="${RUNNER_TEMP}/repolens-fixtures"
          smoke_fixture="${smoke_parent}/happy-path"
          mkdir -p "${smoke_parent}"
          cp -R tests/fixtures/context_pack/happy-path "${smoke_fixture}"

          /tmp/repolens-smoke/bin/repolens --help
          /tmp/repolens-smoke/bin/repolens index "${smoke_fixture}"
          /tmp/repolens-smoke/bin/repolens status "${smoke_fixture}" --json
          /tmp/repolens-smoke/bin/repolens context "${smoke_fixture}" "Find auth-related files" --json
          /tmp/repolens-smoke/bin/repolens preflight "${smoke_fixture}" "Find auth-related files" --json
